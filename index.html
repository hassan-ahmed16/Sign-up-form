<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>
    <div id="main">
        <h1>Sign Up</h1>
        <form id="register-form">
            <div>
                <input type="email" id="email-inp" placeholder="enter your email" required="required">
            </div>
            <div id="pass-div">
                <input type="text" id="password-inp" placeholder="enter your password" required="required">
                <p>! Password should be at least 6 characters</p>
            </div>

            <div id="btn-div">
                <input id="submit-btn" type="submit" value="register">
                <h2 id="success">Account Created!</h3>
            </div>
        </form>
    </div>
    <script type="module" src="./app.js"></script>
</body>

</html>
